<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoahAnalyst Terminal</title>
    <style>
        body {
            background-color: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #2a2e39;
            padding: 30px;
            border-radius: 8px;
            background: #1c2030;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00b15d;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #848e9c;
            font-size: 14px;
        }
        .status {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(0, 177, 93, 0.1);
            color: #00b15d;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 NoahAnalyst Web App</h1>
        <p>Market Data Processing & Automated Structure Analysis Engine</p>
        <div class="status">● SYSTEM RUNNING VIA TERMUX</div>
    </div>
</body>
</html>
